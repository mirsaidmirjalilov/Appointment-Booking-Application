spring:
  application:
    name: Insurance platform

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/changeset/changelog-master.yml
    default-schema: public

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  springdoc:
    swagger-ui:
      path: /swagger-ui.html

